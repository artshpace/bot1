<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финансовая аналитика — Админ-панель</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/account.css">
  <style>
    .ana-bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding: 0 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .ana-bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 40px; }
    .ana-bar { background: var(--accent); border-radius: 4px 4px 0 0; width: 100%; min-height: 4px; transition: height .4s; }
    .ana-bar-label { font-size: .7rem; color: var(--text-muted); margin-top: 6px; text-align: center; white-space: nowrap; }
  </style>
</head>
<body class="cab-body">
<div class="cab-shell">

  <aside class="cab-sidebar" data-cab-sidebar="admin"></aside>

  <div>
    <div class="cab-topbar">
      <span class="name">Админ · Финансовая аналитика</span>
      <button class="cab-burger" data-sidebar-toggle aria-label="Меню"><span></span><span></span><span></span></button>
    </div>

    <main class="cab-main">
      <div class="cab-page-head">
        <h1>Финансовая аналитика</h1>
        <p class="sub">Выручка по периодам, разбивка по категориям и задолженности.</p>
      </div>

      <div id="admin-analytics-root"></div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/account.js"></script>
</body>
</html>
