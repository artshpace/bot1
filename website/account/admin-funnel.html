<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Воронка продаж — Админ-панель</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/account.css">
  <style>
    .funnel-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; margin: 0 auto; max-width: 560px; }
    .funnel-stage { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; text-align: center; margin: 4px 0; transition: width .3s; }
    .funnel-arrow { color: var(--text-muted); font-size: 20px; line-height: 1; }
    .funnel-label { font-size: .85rem; color: var(--text-muted); }
    .funnel-count { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin: 2px 0; }
    .funnel-rate { font-size: .75rem; color: var(--text-muted); }
  </style>
</head>
<body class="cab-body">
<div class="cab-shell">

  <aside class="cab-sidebar" data-cab-sidebar="admin"></aside>

  <div>
    <div class="cab-topbar">
      <span class="name">Админ · Воронка продаж</span>
      <button class="cab-burger" data-sidebar-toggle aria-label="Меню"><span></span><span></span><span></span></button>
    </div>

    <main class="cab-main">
      <div class="cab-page-head">
        <h1>Воронка продаж</h1>
        <p class="sub">Путь лида от первой заявки до активного ученика с конверсией на каждом этапе.</p>
      </div>

      <div id="funnel-mount"></div>

      <div id="admin-funnel-root"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supa-config.js"></script>
<script src="../js/supa.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/account.js"></script>
<script src="../js/crm.js"></script>
</body>
</html>
