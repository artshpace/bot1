<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание — Shpigotskiy Art Space</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/account.css">
</head>
<body class="cab-body">
<div class="cab-shell">

  <aside class="cab-sidebar" data-cab-sidebar="student"></aside>

  <div>
    <div class="cab-topbar">
      <span class="name">Расписание</span>
      <button class="cab-burger" data-sidebar-toggle aria-label="Меню"><span></span><span></span><span></span></button>
    </div>

    <main class="cab-main" id="calendar-root">
      <div class="cab-page-head">
        <h1>Расписание занятий</h1>
        <p class="sub">Календарь занятий. Дни с занятиями отмечены точкой — нажмите, чтобы увидеть детали.</p>
      </div>

      <div class="cab-cal-layout">
        <div class="cab-cal-card">
          <div class="cal-toolbar">
            <button class="cal-nav-btn" data-cal="prev" aria-label="Предыдущий месяц"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
            <h2 data-cal="title">—</h2>
            <button class="cal-nav-btn" data-cal="next" aria-label="Следующий месяц"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
          </div>
          <div class="cal-grid" data-cal="grid"></div>
        </div>

        <div class="cab-cal-card" data-cal="detail">
          <p class="cab-empty">Выберите день в календаре.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/account.js"></script>
</body>
</html>
